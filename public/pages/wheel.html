  <script src="/socket.io/socket.io.js"></script>
  <script src='disableDevTools.js'></script>
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"
    integrity="sha512-xi/RZRIF/S0hJ+yJJYuZ5yk6/8pCiRlEXZzoguSMl+vk2i3m6UjUO/WcZ11blRL/O+rnj94JRGwt/CHbc9+6EA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    const socket = io()
    socket.on('data', data => {
      console.log(data)
      document.getElementById('wheelContainer').style.transform = 'rotate(' + data.currentRotation + 'deg)';
      data.wedgesStatus && Object.entries(data.wedgesStatus).forEach(([wedge, status]) => {
        if (status) {
          $('#' + wedge).css('opacity', '1')
        }
        else {
          $('#' + wedge).css('opacity', '0')
        }
      })
    })
    function spin(deg, time, wheel) {
      if (wheel == 'bonus') {
        document.getElementById('bonusWheel').style.transition = 'transform ' + time + 's cubic-bezier(0.2, 0, 0, 1)'
        document.getElementById('bonusWheel').style.transform = 'rotate(' + deg + 'deg)';
        return
      }
      else {
        document.getElementById('wheelContainer').style.transition = 'transform ' + time + 's cubic-bezier(0.3, 0, 0.6, 1)'
        document.getElementById('wheelContainer').style.transform = 'rotate(' + deg + 'deg)';
      }
    }

    let indicatePlayerInterval
    function indicatePlayer(player) {
      if (player == 0) {
        clearInterval(indicatePlayerInterval)
        $('#redPlayer').css('opacity', '0')
        $('#yellowPlayer').css('opacity', '0')
        $('#bluePlayer').css('opacity', '0')
        $('#kims').css('opacity', '1')
        return
      }
      else if (player == 1) {
        clearInterval(indicatePlayerInterval)
        indicatePlayerInterval = setInterval(() => {
          $('#redPlayer').css('opacity', $('#redPlayer').css('opacity') == 1 ? 0 : 1)
          $('#kims').css('opacity', $('#kims').css('opacity') == 1 ? 0 : 1)
        }, 500);
        $('#yellowPlayer').css('opacity', '0')
        $('#bluePlayer').css('opacity', '0')
        $('#kims').css('opacity', '1')
      }
      else if (player == 2) {
        clearInterval(indicatePlayerInterval)
        indicatePlayerInterval = setInterval(() => {
          $('#yellowPlayer').css('opacity', $('#yellowPlayer').css('opacity') == 1 ? 0 : 1)
          $('#kims').css('opacity', $('#kims').css('opacity') == 1 ? 0 : 1)
        }, 500);
        $('#redPlayer').css('opacity', '0')
        $('#bluePlayer').css('opacity', '0')
        $('#kims').css('opacity', '1')
      }
      else if (player == 3) {
        clearInterval(indicatePlayerInterval)
        indicatePlayerInterval = setInterval(() => {
          $('#bluePlayer').css('opacity', $('#bluePlayer').css('opacity') == 1 ? 0 : 1)
          $('#kims').css('opacity', $('#kims').css('opacity') == 1 ? 0 : 1)
        }, 500);
        $('#redPlayer').css('opacity', '0')
        $('#yellowPlayer').css('opacity', '0')
        $('#kims').css('opacity', '1')
      }
    }

    socket.on('spinWheel', (deg, time) => {
      spin(deg, time, 'main')
    })
    socket.on('spinBonusWheel', (deg, time) => {
      spin(deg, time, 'bonus')
    })
    socket.on('indicatePlayer', (player) => {
      indicatePlayer(player)
    })
    socket.on('showWheel', round => {
      $(`#wheel1, #wheel2, #wheel3, #wheel4, #wheel5, #bonusContainer`).css('opacity', '0')
      if (round == 'bonus') {
        $(`#bonusContainer`).css('opacity', '1')
      }
      else $(`#wheel${round}`).css('opacity', '1')
    })

    socket.on('toggleWedge', (wedge, status) => {
      if (status) {
        $('#' + wedge).css('opacity', '1')
      }
      else {
        $('#' + wedge).css('opacity', '0')
      }
    })
  </script>
</body>
