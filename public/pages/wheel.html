  <script>
    const socket = io()
    // function playSound(url) {
    //   const sound = new Howl({
    //     src: [url]
    //   });
    //   sounds.push(sound)
    //   sound.play();
    // }

    function spin(deg, time) {
      document.getElementById('wheelContainer').style.transition = 'transform ' + time + 's cubic-bezier(0.2, 0, 0, 1)'
      document.getElementById('wheelContainer').style.transform = 'rotate(' + deg + 'deg)';
    }

    socket.on('spinWheel', (deg, time) => {
      spin(deg, time)
    })
    socket.on('indicatePlayer', (player) => {
      indicatePlayer(player)
    })
    socket.on('showWheel', round => {
      $(`#wheel1, #wheel2, #wheel3, #wheel4`).css('opacity', '0')
      $(`#wheel${round}`).css('opacity', '1')
    })

    socket.on('toggleWedge', (wedge, status) => {
      if (status) {
        $('#' + wedge).css('opacity', '1')
      }
      else {
        $('#' + wedge).css('opacity', '0')
      }
    })
  </script>
