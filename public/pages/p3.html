<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player 3</title>
  <style>
    * {
      font-size: 20pt
    }

    p {
      color: white;
      text-align: center;
      margin: 1px;
    }

    button:hover {
      background: white !important;
      color: black !important;
    }

    button:disabled {
      background: black !important;
      color: white !important;
      opacity: 0.5;
    }

    button:hover:disabled {
      background: black !important;
      color: white !important;
      opacity: 0.5;
    }

    #wheelWeb {
      width: 1920px;
      position: absolute;
      top: -325px;
      aspect-ratio: 16 / 9;
      scale: 0.4;
      left: -577px;
      border: none;
    }

    #wheelWeb.zoomedInP1 {
      width: 1920px;
      position: absolute;
      top: -60px;
      aspect-ratio: 16 / 9;
      scale: 1;
      left: -503px;
      transform: rotate(45deg);
    }

    #wheelWeb.zoomedInP2 {
      width: 1920px;
      position: absolute;
      top: -70px;
      aspect-ratio: 16 / 9;
      scale: 1;
      left: -603px;
      transform: rotate(0deg);
    }

    #wheelWeb.zoomedInP3 {
      width: 1920px;
      position: absolute;
      top: -60px;
      aspect-ratio: 16 / 9;
      scale: 1;
      left: -703px;
      transform: rotate(-45deg);
    }
  </style>
</head>

<body style='background:black;overflow: hidden;margin:0;position: absolute;'>
  <div style='overflow: hidden;background-color: #202020;
    width: 772px;
    position: absolute;
    top: 433px;
    height: 435px;'>
    <iframe src="wheel.html" id="wheelWeb"></iframe>
  </div>
  <iframe src='puzzle.html'
    style='width: 1920px;aspect-ratio:16/9;transform-origin: top left;scale:.4;display: inline;position: absolute;'></iframe>
  <div style='width: calc(100vw - 770px);right:-100vw;position: absolute;height: 367px;'>
    <div style='display: flex;'>
      <div style='width: 100%;border:1px solid white;' id='p1Slot'>
        <p id='p1Name'>NC1</p>
        <p>0</p>
      </div>
      <div style='width: 100%;border:1px solid white;' id='p2Slot'>
        <p id='p2Name'>NC2</p>
        <p>0</p>
      </div>
      <div style='width: 100%;border:1px solid white;' id='p3Slot'>
        <p id='p3Name'>NC3</p>
        <p>0</p>
      </div>
    </div>
    <button id='buzzer' style='color:white;background:black;border:1px solid white;width: 100%;height: 100%;'
      disabled>Chuông</button>
    <button id='spin' disabled
      style='color:white;background:black;border:1px solid white;width: 100%;height: 118%;'>Quay</button>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="./disableDevTools.js"></script>
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"
    integrity="sha512-xi/RZRIF/S0hJ+yJJYuZ5yk6/8pCiRlEXZzoguSMl+vk2i3m6UjUO/WcZ11blRL/O+rnj94JRGwt/CHbc9+6EA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    const socket = io();
    $('#buzzer').click(() => {
      socket.emit('buzz', 3);
      $(this).prop('disabled', true)
    })
    $('#spin').click(() => {
      socket.emit('spin', 3)
      socket.emit('lockSpinButton', 3)
      $('#spin').prop('disabled', true)
    })
    socket.on('unlockSpin', (player) => {
      if (player == 3) {
        $('#spin').prop('disabled', false)
      }
    })
    socket.on('lockSpinButton', (player) => {
      if (player == 3) {
        $('#spin').prop('disabled', true)
      }
    })
  </script>
  <script src='playerGeneral.js'></script>
  <script src='disableDevTools.js'></script>
</body>

</html>
