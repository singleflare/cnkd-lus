    const socket = io();

    $(() => {
      for (let i = 0; i <= 55; i++) {
        $('#controlLetters').append('<button class="letterBtn" id="letterBtn' + i + '"></button>');

    let puzzles = [];
    let solvedPuzzles = [];
    let questions = []
    let explains = []
    let puzzleNumber = 0
    let onetwothree = [1, 2, 3]

    $('#fileInput').on('change', async (e) => {
      const file = e.target.files[0]
      const data = await file.arrayBuffer()
      const workbook = XLSX.read(data)
      const sheet = workbook.Sheets[workbook.SheetNames[0]]
      // Helper function to safely get cell 
      const getCellValue = (sheet, col, row) => {
        const cell = sheet[XLSX.utils.encode_cell({ c: col, r: row })]
        return cell ? cell.v : ''
      }
      let puzzle = []
      let solvedPuzzle = []
      for (let r = 1; r <= 100; r++) {
        for (let c = 0; c < 14; c++) {
          puzzle.push(getCellValue(sheet, c, r))
        }
        for (let c = 15; c < 29; c++) {
          solvedPuzzle.push(getCellValue(sheet, c, r))
        }
        if (r % 5 == 4) {
          puzzles.push(puzzle)
          solvedPuzzles.push(solvedPuzzle)
          puzzle = []
          solvedPuzzle = []
          r++
        }
      }
      console.log(puzzles, solvedPuzzles)
    })

    function countLetters(puzzleArray) {
      let letters = ['A', 'Ă', 'Â', 'B', 'C', 'D', 'Đ', 'E', 'Ê', 'G', 'H', 'I', 'K', 'L', 'M', 'N', 'O', 'Ô', 'Ơ', 'P', 'Q', 'R', 'S', 'T', 'U', 'Ư', 'V', 'X', 'Y']
      let numberOfLetters = []
      let totalNumOfLetters = 0
      letters.forEach(letter => {
        let letterCount = 0
        puzzles.forEach(puzzleLetter => {
          if (puzzleLetter == letter) letterCount++
        })
        numberOfLetters.push(letterCount)
        totalNumOfLetters += letterCount
      })
      console.log(totalNumOfLetters)
      return [numberOfLetters, totalNumOfLetters]
    }

    function resetControlLetters() {

        $('#letterBtn' + i).text('')

        $('#letterBtn' + i).hover(() => {
          $('#letterBtn' + i).css('background-color', 'white')
          $('#letterBtn' + i).css('color', 'black')
        })
        $('#letterBtn' + i).mouseleave(() => {
          $('#letterBtn' + i).css('background-color', 'black')
          $('#letterBtn' + i).css('color', 'white')
        })
      }
    }

      socket.emit('resetBuzzers')

          $('#letterBtn' + i).prop('disabled', true)
          $('#letterBtn' + i).text('')
          $('#letterBtn' + i).prop('disabled', false)
          puzzles[puzzleNumber][i] != '' ? $('#letterBtn' + i).text(puzzles[puzzleNumber][i]) : $('#letterBtn' + i).prop('disabled', true)
        }
        socket.emit('puzzle', { puzzle: puzzles[puzzleNumber], solved: solvedPuzzles[puzzleNumber] })
      }
    })

    let p1Score = 0, p2Score = 0, p3Score = 0, p1Total = 0, p2Total = 0, p3Total = 0

    function plus(player, score) {
      if (player == 1) {
        p1Score += score
        $('#p1Score').text(p1Score)
      }
      else if (player == 2) {
        p2Score += score
        $('#p2Score').text(p2Score)
      }
      else if (player == 3) {
        p3Score += score
        $('#p3Score').text(p3Score)
      }
    }
    function minus(player, score) {
      if (player == 1) {
        p1Score -= score
        $('#p1Score').text(p1Score)
      }
      else if (player == 2) {
        p2Score -= score
        $('#p2Score').text(p2Score)
      }
      else if (player == 3) {
        p3Score -= score
        $('#p3Score').text(p3Score)
      }
    }
    function double(player) {
      if (player == 1) {
        p1Score *= 2
        $('#p1Score').text(p1Score)
      }
      else if (player == 2) {
        p2Score *= 2
        $('#p2Score').text(p2Score)
      }
      else if (player == 3) {
        p3Score *= 2
        $('#p3Score').text(p3Score)
      }
    }
    function half(player) {
      if (player == 1) {
        p1Score /= 2
        $('#p1Score').text(p1Score)
      }
      else if (player == 2) {
        p2Score /= 2
        $('#p2Score').text(p2Score)
      }
      else if (player == 3) {
        p3Score /= 2
        $('#p3Score').text(p3Score)
      }
    }

    }
