  <style>
    * {
      -webkit-user-select: none;
      /* Safari */
      -ms-user-select: none;
      /* IE 10 and IE 11 */
      user-select: none;
      /* Standard syntax */
      pointer-events: none;
    }

    @font-face {
      font-family: helve;
      src: url("../gpx/helveticaneuecondensedblack.ttf");
    }

    @font-face {
      font-family: lufga;
      src: url("../gpx/Fz\ Lufga\ Bold.ttf");
    }

    body {
      background-color: white;
      margin: 0;
      overflow: hidden;
    }

    p {
      font-family: 'helve';
      font-size: 65pt;
      text-align: center;
      margin: 12px 0px;
    }

    #board {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      grid-template-rows: repeat(4, 1fr);
      left: 151px;
      top: 253px;
      gap: 8px;
    }

    .letter {
      background-image: url('../gpx/ô chữ.png');
      background-size: contain;
      background-repeat: no-repeat;
      width: 108.1px;
      height: 129px;
    }

    .letter.hasLetter {
      background-image: url('../gpx/ô chữ hiện.png');
    }

    .letter.waitToOpen {
      background-image: url('../gpx/chữ cái được gọi.png');
    }

    #p1Score,
    #p2Score,
    #p3Score {
      font-size: 60pt;
      color: white;
      text-shadow: 2px 2px black;
    }

    #p1Name,
    #p2Name,
    #p3Name {
      font-size: 20pt;
      color: white;
      text-shadow: 2px 2px black;
    }

    .flexcon {
      display: flex;
      width: 1920px;
      position: relative;
    }

    .flexcon>* {
      width: 100%;
      text-align: center;
    }

    .buzz {
      transition: opacity 0.5s;
    }

    let vol = .1
    function playSound(url, vol) {
      const sound = new Howl({
        src: [url],
        volume: vol
      });
      sounds.push(sound)
      sound.play();
    }
    function stopAllSounds() {
      for (let sound of sounds) {
        sound.stop()
      }
      sounds = []
    }
    let sounds = []
    socket.on('playSound', url => {
      playSound(url, vol)
    })
    socket.on('stopAllSounds', () => {
      stopAllSounds()
    })

    function digitGroup(dInput) {
      let output = "";
      for (let i = String(dInput).length - 1; i > -1; i--) {
        output = String(dInput).charAt(i) + output;
        let cnt = String(dInput).length - i;
        if (cnt % 3 === 0 && i !== 0) output = "." + output;
      }
      return output;
    }

    function showCategory(catType, category) {
      console.log(catType, category)
      if (catType == 'hide') {
        $('#catContainer').animate({
          top: '240px'
        }, 500, 'swing')
        $('#uplight').stop().css({
          'opacity': 1, 'left': '393px'
        })
        $('#downlight').stop().css({
          'opacity': 1, 'left': '1353px'
        })
      }
      else {
        if (catType == 'normal') {
          $('#normal').css('opacity', '0')
          $('#giaima').css('opacity', '0')
          $('#tunghoanh').css('opacity', '0')
        }
        else if (catType == 'giaima') {
          $('#giaima').css('opacity', '1')
          $('#normal').css('opacity', '0')
          $('#tunghoanh').css('opacity', '0')
        }
        else if (catType == 'tunghoanh') {
          $('#tunghoanh').css('opacity', '1')
          $('#normal').css('opacity', '0')
          $('#giaima').css('opacity', '0')
        }
        $('#catText').text(category)
        $('#catContainer').animate({
          top: '0px'
        }, 500, 'swing')
        $('#uplight').animate({
          'opacity': 0, 'left': '1353px'
        }, 60000, 'linear')
        $('#downlight').animate({
          'opacity': 0, 'left': '393px'
        }, 60000, 'linear')
      }
    }

    function reveal(index, letter, state) {
      if (state == 0) {
        $('#letter' + index).removeClass('waitToOpen hasLetter')
      }
      else if (state == 1) {
        $('#letter' + index).addClass('hasLetter')
      }
      else if (state == 2) {
        $('#letter' + index).addClass('waitToOpen')
      }
      else if (state == 3) {
        $('#letter' + index).addClass('hasLetter').removeClass('waitToOpen');
        $('#letter' + index + ' p').text(letter);
      }
    }

    function revealPuzzle(puzzle) {
      playShowPuzzleVid()
      console.log(puzzle)
      let openSequence = [14, 28, 1, 15, 29, 43, 2, 16, 30, 44, 3, 17, 31, 45, 4, 18, 32, 46, 5, 19, 33, 47, 6, 20, 34, 48, 7, 21, 35, 49, 8, 22, 36, 50, 9, 23, 37, 51, 10, 24, 38, 52, 11, 25, 39, 53, 12, 26, 40, 54, 27, 41]
      let i = 0
      let interval = setInterval(() => {
        if (puzzle[openSequence[i]] != '') {
          $('#letter' + openSequence[i]).addClass('hasLetter');
        }
        if (puzzle[openSequence[i]] == '?' || puzzle[openSequence[i]] == '-' || puzzle[openSequence[i]] == '!' || puzzle[openSequence[i]] == '.' || puzzle[openSequence[i]] == ',' || puzzle[openSequence[i]] == "&" || puzzle[openSequence[i]] == '/' || puzzle[openSequence[i]] == '#') {
          $('#letter' + openSequence[i]).addClass('hasLetter').removeClass('waitToOpen');
          $('#letter' + openSequence[i] + ' p').text(puzzle[openSequence[i]]);
        }
        i++
        if (i >= openSequence.length) clearInterval(interval)
      }, 25)
    }

    function solvePuzzle(puzzle, mode) {
      if (mode == 'normal') playSolvePuzzleVid()
      else if (mode == 'tossup') playSolveTossupPuzzleVid()
      console.log(puzzle)
      let openSequence = [14, 28, 1, 15, 29, 43, 2, 16, 30, 44, 3, 17, 31, 45, 4, 18, 32, 46, 5, 19, 33, 47, 6, 20, 34, 48, 7, 21, 35, 49, 8, 22, 36, 50, 9, 23, 37, 51, 10, 24, 38, 52, 11, 25, 39, 53, 12, 26, 40, 54, 27, 41]
      let i = 0
      let interval = setInterval(() => {
        console.log(i, openSequence[i], puzzle[openSequence[i]])
        $('#letter' + openSequence[i] + ' p').text(puzzle[openSequence[i]]);
        i++
        if (i >= openSequence.length) clearInterval(interval)
      }, 10)
    }

    socket.on('revealPuzzle', puzzle => revealPuzzle(puzzle))
    socket.on('reveal', (data) => reveal(data.index, data.letter, data.state))

    socket.on('solvePuzzle', (data) => {
      solvePuzzle(data.solvedPuzzle, data.mode);
    });
    socket.on('resetPuzzle', () => {
      for (let i = 0; i <= 55; i++) {
        $('#letter' + i).removeClass('waitToOpen hasLetter');
        $('#letter' + i + ' p').text('');
      }
    })

    socket.on('puzzleType', (type, category) => {
      showCategory(type, category)
    })
    socket.on('showKs', () => {
      $('#ksContainer').animate({
        'left': '40px'
      }, 500, 'swing')
      $('#p1ScoreContainer, #p2ScoreContainer, #p3ScoreContainer').animate({
        'left': '+=270px'
      }, 500, 'swing')
    })
    socket.on('hideKs', () => {
      $('#ksContainer').animate({
        'left': '-500px'
      }, 500, 'swing')
      $('#p1ScoreContainer, #p2ScoreContainer, #p3ScoreContainer').animate({
        'left': '-=270px'
      }, 500, 'swing')
    })

    socket.on('openRandomTossup', () => {
      playTossupVid()
    })
    socket.on('scoreboard', (data) => {
      $('#p1Name').text(data.p1.name);
      $('#p2Name').text(data.p2.name);
      $('#p3Name').text(data.p3.name);
      $('#p1Score').text(digitGroup(data.p1.score) + ' GL');
      $('#p2Score').text(digitGroup(data.p2.score) + ' GL');
      $('#p3Score').text(digitGroup(data.p3.score) + ' GL');
    });

    socket.on('togglePlayerWedge', (player, status, wedge) => {
      if (status) {
        if (player == 'ks') $('#ks' + wedge).css('opacity', '1')
        else $('#p' + player + wedge).css('opacity', '1')
      }
      else {
        if (player == 'ks') $('#ks' + wedge).css('opacity', '0.1')
        else $('#p' + player + wedge).css('opacity', '0.1')
      }
    })

    socket.on('setKsScore', score => {
      $('#ksScore').text(digitGroup(score) + ' GL')
    })
    socket.on('setPlayerQualify', (player, state) => {
      console.log(player, state)
      $('#p' + player + 'ScoreContainer .color,#p' + player + 'ScoreContainer .gray').css('opacity', 0)
      $('#p' + player + 'ScoreContainer .' + (state ? 'gray' : 'color')).css('opacity', 1)
    })
    socket.on('buzzed', player => {
      $('#p' + player + 'ScoreContainer .buzz').css('opacity', 1)
    })
    socket.on('buzzersReset', player => {
      $('.buzz').css('opacity', 0)
    })
  </script>
</body>

</html>
